# This is a basic workflow to help you get started with Actions

name: Run Update Paper Links Weekly

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      days_back:
        description: 'How many days back to refresh links (default: 30)'
        required: false
        default: '30'
  schedule:
    - cron:  "0 8 * * 1"  # Run At 08:00 on Monday

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Refresh recent paper links
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back || '30' }}"
          START_DATE=$(date -u -d "${DAYS_BACK} days ago" +%Y-%m-%d)
          END_DATE=$(date -u +%Y-%m-%d)
          echo "Refreshing paper links from: $START_DATE to $END_DATE"
          python get_paper.py --update_paper_links --start_date "$START_DATE" --end_date "$END_DATE"

      - name: Build analytics artifacts
        run: |
          python scripts/build_analytics.py --store docs/data --out docs/analytics

      - name: Commit and push updates
        run: |
          # Use the GitHub Actions bot identity — works correctly for all forks
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage README + entire docs tree (includes docs/data shards and analytics outputs)
          git add README.md docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: weekly paper links refresh $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
