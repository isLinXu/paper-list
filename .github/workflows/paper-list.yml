# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  # After forking: go to Actions tab and click "Enable workflow" first
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Empty = 2 days ago'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD). Empty = today'
        required: false
        default: ''
  schedule:
    - cron:  "0 0 * * *"  # Run once daily at 00:00 UTC

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run daily arxiv
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            START_DATE="${{ github.event.inputs.start_date }}"
          else
            START_DATE=$(date -u -d "2 days ago" +%Y-%m-%d)
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_DATE="${{ github.event.inputs.end_date }}"
          else
            END_DATE=$(date -u +%Y-%m-%d)
          fi
          echo "Fetching papers from: $START_DATE to $END_DATE"
          python get_paper.py --start_date "$START_DATE" --end_date "$END_DATE"

      - name: Enrich paper links
        run: |
          START_DATE=$(date -u -d "7 days ago" +%Y-%m-%d)
          END_DATE=$(date -u +%Y-%m-%d)
          python get_paper.py --update_paper_links --start_date "$START_DATE" --end_date "$END_DATE"

      - name: Build analytics artifacts
        run: |
          python scripts/build_analytics.py --store docs/data --out docs/analytics

      - name: Commit and push updates
        run: |
          # Use the GitHub Actions bot identity — works correctly for all forks
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage README + entire docs tree (includes docs/data shards and analytics outputs)
          git add README.md docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: daily paper update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
