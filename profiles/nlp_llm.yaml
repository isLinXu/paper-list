# NLP/LLM Profile — Natural Language Processing & Large Language Models (8 topics)
# Ideal for researchers focused on language models and reasoning.
#
# Usage: python scripts/setup_fork.py --profile nlp_llm

user_name: "YOUR_GITHUB_USERNAME"
repo_name: "paper-list"

start_date: null
end_date: null

base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
show_authors: True
show_links: True
show_badge: True
max_results: 100

filename: "output.json"
filename_web: "output_web.json"
md_filename: "output.md"
md_filename_web: "output_web.md"

publish_readme: True
publish_gitpage: True
publish_wechat: False

json_readme_path: './docs/data'
json_gitpage_path: './docs/data'
json_wechat_path: './docs/paper_list_wechat.json'
md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

concurrent_fetch: True
max_workers: 3
deduplicate: True

topic_groups:
  - ["Language Models", "LLM Suite", "theme-card--llm",
     ["LLM", "Latent Space LLM", "Reasoning"]]
  - ["Multimodal", "Cross-Modal AI", "theme-card--multimodal",
     ["Multimodal", "AI Agent", "Audio Processing"]]
  - ["Safety & Efficiency", "Responsible AI", "theme-card--safety",
     ["AI Safety", "Efficient AI", "Transfer Learning"]]

keywords:
  "LLM":
    enabled: true
    filters: ["Large Language Model", "LLM", "Language Model", "Instruction Tuning", "In-context Learning"]

  "Latent Space LLM":
    enabled: true
    filters: ["Latent Language Model", "Latent Space", "Vector Quantized Language Model"]

  "Reasoning":
    enabled: true
    filters: ["Reasoning", "Chain-of-Thought", "Mathematical Reasoning", "Logical Reasoning"]

  "Multimodal":
    enabled: true
    filters: ["Multimodal", "Vision-Language", "Visual Question Answering", "Image Captioning"]

  "AI Agent":
    enabled: true
    filters: ["AI Agent", "Autonomous Agent", "Tool Use", "Planning"]

  "Audio Processing":
    enabled: true
    filters: ["Speech Recognition", "Text-to-Speech", "Audio Generation", "Sound Source Separation"]

  "AI Safety":
    enabled: true
    filters: ["AI Safety", "Alignment", "Red Teaming", "Jailbreak Defense"]

  "Efficient AI":
    enabled: true
    filters: ["Model Compression", "Quantization", "Pruning", "Knowledge Distillation", "Efficient Inference"]
