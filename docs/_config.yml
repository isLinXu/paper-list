title: Paper Arxiv Daily
description: Automatically Update Papers Daily using Github Actions (Update Every 8th hours)
show_downloads: true

github:
  zip_url: https://github.com/isLinXu/paper-list
  another_url: https://github.com/isLinXu/paper-list

social_links:
  twitter:
  github: isLinXu

defaults:
